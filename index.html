<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>格力高 Glico 客服助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brand:#E4002B;--brand-dark:#B80023;--brand-light:#FF6B6B;--brand-bg:#FFF5F5;--success:#2D9F60;--text:#2C2C2C;--text-light:#6B6B6B;--border:#E8E0E0;--bg:#FAF7F5;--white:#FFF;--shadow:0 2px 8px rgba(228,0,43,.08);--shadow-hover:0 6px 20px rgba(228,0,43,.15);--radius:12px;--fs:16px}
html{font-size:var(--fs)}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-bottom:40px}
body.fs-large{--fs:18px}body.fs-xlarge{--fs:20px}

.header{background:linear-gradient(135deg,#FFE4E8,#FFD0D6);color:#333;padding:16px;box-shadow:0 4px 12px rgba(228,0,43,.1);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo-box{background:#fff;border-radius:12px;padding:6px 12px;display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.1);flex-shrink:0}
.logo-img{height:50px;width:auto;display:block}
.header-center{flex:1;min-width:180px}
.header h1{font-size:1.25rem;margin-bottom:4px;letter-spacing:1px;font-weight:700;color:#C8102E}
.header-contact{font-size:.8rem;opacity:.95;line-height:1.7;color:#555}
.header-contact strong{color:var(--brand);margin-right:4px}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{background:rgba(228,0,43,.08);border:1px solid rgba(228,0,43,.2);color:var(--brand);padding:10px 18px;border-radius:24px;font-size:1rem;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.btn-icon:hover{background:rgba(228,0,43,.15)}
@media(max-width:640px){.header-inner{gap:10px}.header h1{font-size:1.05rem}.header-contact{font-size:.72rem}.logo-img{height:40px}.btn-icon{padding:8px 14px;font-size:.9rem}}

.marquee-wrap{background:#FFF8E1;border-bottom:1px solid #F5D98E;overflow:hidden;padding:8px 0}
.marquee{display:inline-block;white-space:nowrap;animation:marquee 40s linear infinite;font-size:.85rem;color:#8B4513}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

.container{max-width:1200px;margin:0 auto;padding:16px}

.update-banner{background:#E8F5E9;border:1px solid #81C784;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:.9rem;color:#1B5E20}
.update-banner.show{display:flex}
.update-banner button{background:#2E7D32;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit}

.search-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-box input{flex:1;border:none;outline:none;font-size:1rem;color:var(--text);background:transparent;padding:4px 0;font-family:inherit}
.search-icon{color:var(--brand);font-size:1.2rem}
.search-clear{background:var(--border);border:none;border-radius:50%;width:24px;height:24px;font-size:.8rem;cursor:pointer;color:var(--text-light);display:none}
.search-clear.show{display:block}

.main-layout{display:flex;gap:16px;align-items:flex-start}
.sidebar{width:220px;flex-shrink:0;position:sticky;top:120px;max-height:calc(100vh - 140px);overflow-y:auto;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:0;border:1px solid var(--border)}
.sidebar-header{background:var(--brand);color:#fff;padding:12px 16px;font-weight:700;font-size:.95rem;border-radius:var(--radius) var(--radius) 0 0;text-align:center}
.categories{padding:8px}
.category-card{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;font-size:.9rem;color:var(--text);border:1px solid transparent}
.category-card:hover{background:var(--brand-bg);color:var(--brand)}
.category-card.active{background:var(--brand);color:#fff;font-weight:600;border-color:var(--brand)}
.cat-icon{font-size:1.1rem}
.cat-name{flex:1}
.cat-count{font-size:.75rem;opacity:.7}

@media(max-width:900px){
  .main-layout{flex-direction:column}
  .sidebar{width:100%;position:static;max-height:none;overflow:visible}
  .sidebar.collapsed .categories{display:none}
  .sidebar.collapsed .sidebar-header::after{content:' ▼';font-size:.8rem}
  .sidebar-header{cursor:pointer}
  .sidebar-toggle{display:none}
}
@media(min-width:901px){.sidebar-toggle{display:none}}

.section-title{font-size:1.1rem;font-weight:700;color:var(--brand);margin:16px 0 12px;padding-left:12px;border-left:4px solid var(--brand);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.section-title .count-badge{font-size:.8rem;color:var(--text-light);font-weight:500}

.qa-list{display:flex;flex-direction:column;gap:12px}
.qa-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border);transition:.2s;position:relative}
.qa-card:hover{box-shadow:var(--shadow-hover)}
.qa-header{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.qa-header:hover{background:var(--brand-bg)}
.qa-title{flex:1;font-weight:600;color:var(--text);font-size:1rem;line-height:1.5}
.qa-arrow{color:var(--brand);font-size:1rem;transition:transform .2s;flex-shrink:0;margin-top:2px}
.qa-card.open .qa-arrow{transform:rotate(180deg)}
.qa-content{max-height:0;overflow:hidden;transition:max-height .3s ease-out;background:var(--brand-bg)}
.qa-card.open .qa-content{max-height:10000px}
.qa-body{padding:16px;font-size:.95rem;white-space:pre-wrap;word-break:break-word;line-height:1.8;color:var(--text);border-top:1px solid var(--border)}
.qa-body img{max-width:100%;height:auto;border-radius:8px;margin:8px 0;display:block}
.qa-body a{color:var(--brand);text-decoration:underline;word-break:break-all}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;margin:10px 0;border-radius:8px;overflow:hidden;background:#000}
.video-wrap iframe,.video-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.qa-tags{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:.75rem;padding:3px 10px;background:var(--border);color:var(--text-light);border-radius:12px}
.badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block;margin-left:6px;vertical-align:middle}
.badge-urgent{background:#FFE5E5;color:#C8102E;border:1px solid #C8102E}
.badge-internal{background:#FFF3CD;color:#856404;border:1px solid #F0C040}

.ct-red{color:#E4002B;font-weight:600}.ct-orange{color:#E67E22;font-weight:600}.ct-green{color:#27AE60;font-weight:600}.ct-blue{color:#2980B9;font-weight:600}.ct-purple{color:#8E44AD;font-weight:600}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}.empty-state .big{font-size:3rem;margin-bottom:10px}

/* Admin buttons on cards */
.qa-admin-btns{display:none;position:absolute;top:8px;right:8px;gap:4px;z-index:5}
body.admin-mode .qa-admin-btns{display:flex}
.qa-admin-btns button{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.75rem;cursor:pointer;transition:.15s}
.qa-admin-btns button:hover{background:var(--brand-bg);border-color:var(--brand)}
.cat-manage-btn{display:none;background:var(--brand-bg);color:var(--brand);border:1px solid var(--brand);border-radius:6px;padding:2px 10px;font-size:.75rem;cursor:pointer}
body.admin-mode .cat-manage-btn{display:inline-block}

/* Inline Edit Panel */
.qa-edit-panel{display:none;padding:16px;background:#fff;border-top:2px solid var(--brand)}
.qa-edit-panel.show{display:block}
.edit-field{margin-bottom:12px}
.edit-field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px;color:var(--text)}
.edit-field input,.edit-field select,.edit-field textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;transition:.2s}
.edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(228,0,43,.1)}
.edit-toolbar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tool-btn{padding:3px 8px;border:1px solid var(--border);border-radius:6px;font-size:.75rem;cursor:pointer;background:#fff;font-family:inherit}
.tool-btn:hover{background:var(--brand-bg)}
.tool-sep{width:1px;background:var(--border);margin:0 4px}
.edit-textarea{min-height:200px;resize:vertical;line-height:1.8}
.edit-check{display:flex;gap:16px;margin:8px 0}
.edit-check label{display:flex;align-items:center;gap:4px;font-size:.85rem;cursor:pointer}
.edit-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.edit-save{background:var(--brand);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:.9rem;cursor:pointer;font-family:inherit}
.edit-cancel{background:var(--border);color:var(--text);border:none;padding:8px 16px;border-radius:8px;font-size:.9rem;cursor:pointer;font-family:inherit}
.edit-delete{background:#fff;color:#C62828;border:1px solid #C62828;padding:8px 16px;border-radius:8px;font-size:.9rem;cursor:pointer;margin-left:auto;font-family:inherit}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.modal-content{background:var(--white);border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1;border-radius:16px 16px 0 0}
.modal-header h2{font-size:1.1rem;color:var(--text)}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-light);padding:4px 8px}
.modal-body{padding:20px}

/* Admin Tabs */
.admin-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;border-bottom:2px solid var(--border);padding-bottom:8px}
.admin-tab{padding:8px 16px;border:none;background:none;font-size:.85rem;cursor:pointer;border-radius:8px 8px 0 0;color:var(--text-light);font-family:inherit;font-weight:500;transition:.15s}
.admin-tab:hover{background:var(--brand-bg);color:var(--brand)}
.admin-tab.active{background:var(--brand);color:#fff}

/* Admin Forms */
.login-form{text-align:center;padding:40px 20px}
.login-form input{width:100%;max-width:300px;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:1rem;text-align:center;font-family:inherit;margin-bottom:4px}
.login-form input:focus{outline:none;border-color:var(--brand)}
.btn-primary{background:var(--brand);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:600;transition:.2s}
.btn-primary:hover{background:var(--brand-dark)}
.btn-secondary{background:var(--border);color:var(--text);border:none;padding:8px 16px;border-radius:8px;font-size:.85rem;cursor:pointer;font-family:inherit;margin-right:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(228,0,43,.1)}

/* Admin list */
.admin-list{display:flex;flex-direction:column;gap:8px}
.admin-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.admin-item-info{flex:1;min-width:0}
.admin-item-title{font-weight:600;font-size:.9rem}
.admin-item-meta{font-size:.8rem;color:var(--text-light)}
.admin-btn{padding:4px 10px;border-radius:6px;font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:#fff;font-family:inherit}
.admin-btn-edit{color:var(--brand)}
.admin-btn-del{color:#C62828;border-color:#EF9A9A}
.admin-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}

/* Export section */
.export-section{padding:20px;margin-bottom:16px;background:var(--brand-bg);border:1px solid var(--border);border-radius:12px}
.export-section h3{margin-bottom:8px;color:var(--brand)}
.export-section p{font-size:.85rem;color:var(--text-light);margin-bottom:12px}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:12px 24px;border-radius:12px;font-size:.9rem;z-index:300;transition:.3s;opacity:0;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Scroll top */
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;background:var(--brand);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 12px rgba(228,0,43,.3);display:none;z-index:90;font-family:inherit}
.scroll-top.show{display:block}
</style>
</head>
<body>

<div class="header">
<div class="header-inner">
<div class="logo-box">
<img src="logo.png" alt="Glico 格力高" class="logo-img">
</div>
<div class="header-center">
<h1 id="headerTitle">格力高 Glico 客服助手</h1>
<div class="header-contact" id="headerContact"></div>
</div>
<div class="header-actions">
<button class="btn-icon" onclick="checkUpdate()" title="檢查更新">🔄</button>
<button class="btn-icon" onclick="toggleFontSize()" title="字級">🔤</button>
<button class="btn-icon" onclick="openAdmin()" title="管理">⚙️</button>
</div>
</div>
</div>

<div class="marquee-wrap"><div class="marquee" id="marqueeText"></div></div>

<div class="container">
<div class="update-banner" id="updateBanner"><span>🆕 偵測到新版本！</span><button onclick="applyUpdate()">立即更新</button></div>
<div class="main-layout">
  <aside class="sidebar" id="sidebarPanel">
    <div class="sidebar-header">📂 分類選單</div>
    <div class="categories" id="categoryContainer"></div>
  </aside>
  <main class="content-area">
    <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜尋關鍵字（標題、內容、標籤）..."><button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button></div>
    <div id="resultContainer"></div>
  </main>
</div>
</div>

<button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>

<div class="modal" id="adminModal">
<div class="modal-content">
<div class="modal-header"><h2 id="adminTitle">⚙️ 管理後台</h2><button class="modal-close" onclick="closeAdmin()">✕</button></div>
<div class="modal-body" id="adminBody"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let DATA=null,currentCategory='all',isAdmin=false;
const ADMIN_PASSWORD='1234';
const ICONS=['🏢','🎂','💳','🎁','🏪','🌐','💰','📍','📢','🛍️','🎯','⭐','🔥','💎','🎊','🎉','📝','📋','📊','📈','📌','📞','📱','💬','🚨','⚠️','🔒','🔑','✅','❌','❓','❗','🚀','✨','💡','🎓','📚','📖','🔧','⚙️','🍫','🍪','🍵','🚚','🏃','🎈','🎀','💝','🛒','🏆','🌟','🤝','🔄','👤','📷'];

window.addEventListener('DOMContentLoaded',init);

async function init(){
  try{
    const local=localStorage.getItem('glico_qa_data');
    if(local){try{DATA=JSON.parse(local)}catch(e){DATA=await loadJson()}}
    else DATA=await loadJson();
    renderAll();silentCheck();
  }catch(e){
    document.getElementById('resultContainer').innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>無法載入資料，請確認 data.json</p><p style="font-size:.85rem;margin-top:8px">'+e.message+'</p></div>';
  }
  document.getElementById('searchInput').addEventListener('input',onSearch);
  window.addEventListener('scroll',()=>{document.getElementById('scrollTop').classList.toggle('show',scrollY>300)});
  document.querySelector('.sidebar-header')?.addEventListener('click',()=>{
    if(window.innerWidth<=900)document.getElementById('sidebarPanel')?.classList.toggle('collapsed');
  });
}

async function loadJson(){const r=await fetch('data.json?t='+Date.now());if(!r.ok)throw new Error('載入失敗');return r.json()}

async function silentCheck(){try{const s=await loadJson();const localBuild=DATA.meta.buildNum||0;const serverBuild=s.meta.buildNum||0;if(serverBuild>localBuild&&localStorage.getItem('glico_qa_data')){window._pu=s;document.getElementById('updateBanner').classList.add('show')}}catch(e){}}
async function checkUpdate(){showToast('檢查中...');try{const s=await loadJson();if(!localStorage.getItem('glico_qa_data')){DATA=s;renderAll();showToast('已是最新');return}const localBuild=DATA.meta.buildNum||0;const serverBuild=s.meta.buildNum||0;if(serverBuild>localBuild){window._pu=s;document.getElementById('updateBanner').classList.add('show');showToast('發現新版本（v'+serverBuild+'）！')}else showToast('已是最新（v'+localBuild+'）')}catch(e){showToast('檢查失敗')}}
function applyUpdate(){if(!window._pu)return;DATA=window._pu;window._pu=null;localStorage.removeItem('glico_qa_data');document.getElementById('updateBanner').classList.remove('show');renderAll();showToast('已更新至 v'+(DATA.meta.buildNum||0))}

function renderAll(){
  document.getElementById('headerTitle').textContent=DATA.meta.title||'格力高 Glico 客服助手';
  let c='';
  c+=`<div>📞 <strong>客服</strong>${DATA.meta.subtitle||''}</div>`;
  if(DATA.meta.email)c+=`<div>📧 <strong>信箱</strong>${DATA.meta.email}</div>`;
  if(DATA.meta.lineId)c+=`<div>💬 <strong>LINE</strong>${DATA.meta.lineId}</div>`;
  if(DATA.meta.customFields&&DATA.meta.customFields.length){DATA.meta.customFields.forEach(f=>{if(f.label&&f.value)c+=`<div>📌 <strong>${esc(f.label)}</strong>${esc(f.value)}</div>`})}
  document.getElementById('headerContact').innerHTML=c;
  document.getElementById('marqueeText').textContent=DATA.marquee||'';
  renderCategories();renderQA();
}

function renderCategories(){
  const box=document.getElementById('categoryContainer');
  let h=`<div class="category-card ${currentCategory==='all'?'active':''}" onclick="setCategory('all')"><span class="cat-icon">📋</span><span class="cat-name">全部 QA</span><span class="cat-count">${DATA.qa.length}</span></div>`;
  DATA.categories.forEach(c=>{
    const n=DATA.qa.filter(q=>q.category===c.id).length;
    h+=`<div class="category-card ${currentCategory===c.id?'active':''}" onclick="setCategory('${c.id}')"><span class="cat-icon">${c.icon}</span><span class="cat-name">${esc(c.name)}</span><span class="cat-count">${n}</span></div>`;
  });
  box.innerHTML=h;
}
function setCategory(id){currentCategory=id;renderCategories();renderQA();if(window.innerWidth<=900)document.getElementById('sidebarPanel')?.classList.add('collapsed')}

function renderQA(){
  const ct=document.getElementById('resultContainer');
  const kw=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  let list=DATA.qa;
  if(currentCategory!=='all')list=list.filter(q=>q.category===currentCategory);
  if(kw)list=list.filter(q=>q.title.toLowerCase().includes(kw)||q.content.toLowerCase().includes(kw)||(q.tags||[]).some(t=>t.toLowerCase().includes(kw)));
  if(!list.length){ct.innerHTML='<div class="empty-state"><div class="big">🔍</div><p>找不到符合的 QA</p></div>';return}
  let h='';
  const title=currentCategory==='all'?'全部 QA':DATA.categories.find(c=>c.id===currentCategory)?.name||'';
  h+=`<div class="section-title">${title}<span class="count-badge">${list.length} 則</span><button class="cat-manage-btn" onclick="openAdmin();setTimeout(()=>showAdminTab('category'),100)">📂 管理分類</button></div>`;
  h+='<div class="qa-list">';
  list.forEach(q=>h+=renderCard(q,kw));
  h+='</div>';
  ct.innerHTML=h;
}

function renderCard(q,kw){
  const cat=DATA.categories.find(c=>c.id===q.category);
  let badges='';
  if(q.urgent)badges+='<span class="badge badge-urgent">🚨 緊急</span>';
  if(q.internal)badges+='<span class="badge badge-internal">🔒 內部</span>';
  const content=fmt(q.content);
  const titleHl=kw?hl(q.title,kw):esc(q.title);
  let tags='';
  if(q.tags&&q.tags.length)tags='<div class="qa-tags">'+q.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')+'</div>';
  return `<div class="qa-card" data-id="${q.id}">
    <div class="qa-admin-btns">
      <button onclick="event.stopPropagation();moveQA(${q.id},-1)" title="上移">⬆</button>
      <button onclick="event.stopPropagation();moveQA(${q.id},1)" title="下移">⬇</button>

function moveQA(id,dir){
  const idx=DATA.qa.findIndex(q=>q.id===id);if(idx<0)return;
  if(currentCategory!=='all'){
    const sameCat=DATA.qa.filter(q=>q.category===currentCategory);
    const catIdx=sameCat.findIndex(q=>q.id===id);
    const targetCatIdx=catIdx+dir;
    if(targetCatIdx<0||targetCatIdx>=sameCat.length)return;
    const targetId=sameCat[targetCatIdx].id;
    const globalIdx=DATA.qa.findIndex(q=>q.id===id);
    const globalTargetIdx=DATA.qa.findIndex(q=>q.id===targetId);
    [DATA.qa[globalIdx],DATA.qa[globalTargetIdx]]=[DATA.qa[globalTargetIdx],DATA.qa[globalIdx]];
  } else {
    const j=idx+dir;if(j<0||j>=DATA.qa.length)return;
    [DATA.qa[idx],DATA.qa[j]]=[DATA.qa[j],DATA.qa[idx]];
  }
  saveLocal();renderQA();
}

// Editor helpers
function wrapSel(taId,color){
  const ta=document.getElementById(taId);if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  if(s===e){showToast('請先選取要套用的文字');return}
  const sel=ta.value.slice(s,e);
  ta.value=ta.value.slice(0,s)+`[[${color}:${sel}]]`+ta.value.slice(e);
  ta.focus();
}
function doInsertImg(taId){
  let fileInput=document.getElementById(taId.replace('ie_content_','ie_imgfile_'));
  if(!fileInput){fileInput=document.getElementById('nq_imgfile')}
  if(fileInput)fileInput.click();
}
function doImgFile(input,taId){
  const f=input.files[0];if(!f)return;
  showToast('圖片處理中...');
  const isPng=f.type==='image/png';
  const img=new Image();
  const reader=new FileReader();
  reader.onload=e=>{
    img.onload=()=>{
      let w=img.width,h=img.height;const maxDim=1600;
      if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim}else{w=Math.round(w*maxDim/h);h=maxDim}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const result=isPng?canvas.toDataURL('image/png'):canvas.toDataURL('image/jpeg',0.92);
      const ta=document.getElementById(taId);const pos=ta.selectionStart||ta.value.length;
      ta.value=ta.value.slice(0,pos)+'\n[[img:'+result+']]\n'+ta.value.slice(pos);
      showToast('圖片已插入（'+Math.round(result.length/1370)+'KB）');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);input.value='';
}
function doInsertVideo(taId){
  const url=prompt('請貼上影片網址（YouTube / Vimeo / mp4）：');if(!url)return;
  const ta=document.getElementById(taId);const pos=ta.selectionStart||ta.value.length;
  ta.value=ta.value.slice(0,pos)+'\n[[video:'+url.trim()+']]\n'+ta.value.slice(pos);showToast('影片已插入');
}
function doInsertLink(taId){
  const text=prompt('連結顯示文字：');if(!text)return;
  const url=prompt('網址：');if(!url)return;
  const ta=document.getElementById(taId);const pos=ta.selectionStart||ta.value.length;
  ta.value=ta.value.slice(0,pos)+`[[link:${text}|${url}]]`+ta.value.slice(pos);showToast('連結已插入');
}

// Format
function esc(s){return s==null?'':String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmt(c){
  if(!c)return'';let s=esc(c);
  s=s.replace(/\[\[red:(.*?)\]\]/g,'<span class="ct-red">$1</span>');
  s=s.replace(/\[\[orange:(.*?)\]\]/g,'<span class="ct-orange">$1</span>');
  s=s.replace(/\[\[green:(.*?)\]\]/g,'<span class="ct-green">$1</span>');
  s=s.replace(/\[\[blue:(.*?)\]\]/g,'<span class="ct-blue">$1</span>');
  s=s.replace(/\[\[purple:(.*?)\]\]/g,'<span class="ct-purple">$1</span>');
  s=s.replace(/\[\[link:(.*?)\|(.*?)\]\]/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\[\[img:(.*?)\]\]/g,'<img src="$1" alt="圖片">');
  s=s.replace(/\[\[video:(.*?)\]\]/g,(m,u)=>{u=u.trim();const yt=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]+)/);if(yt)return`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen></iframe></div>`;const vm=u.match(/vimeo\.com\/(\d+)/);if(vm)return`<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${vm[1]}" allowfullscreen></iframe></div>`;if(/\.(mp4|webm|ogg)(\?|$)/i.test(u))return`<div class="video-wrap"><video controls src="${u}"></video></div>`;return`<a href="${u}" target="_blank">🎥 ${u}</a>`});
  s=s.replace(/(^|[^"'>=\/])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  return s;
}
function hl(t,kw){if(!kw)return esc(t);const s=esc(t),k=esc(kw);return s.replace(new RegExp('('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:#FFE58F;padding:0 2px;border-radius:2px">$1</mark>')}

function toggleFontSize(){const b=document.body;if(b.classList.contains('fs-large')){b.classList.remove('fs-large');b.classList.add('fs-xlarge');showToast('字體：特大')}else if(b.classList.contains('fs-xlarge')){b.classList.remove('fs-xlarge');showToast('字體：一般')}else{b.classList.add('fs-large');showToast('字體：大')}}

function renderMetaList(){
  const list=DATA.meta.customFields||[];
  document.getElementById('metaFieldList').innerHTML=list.length?list.map((f,i)=>`<div class="admin-item"><div class="admin-item-info"><div class="admin-item-title">${esc(f.label)}</div><div class="admin-item-meta" style="white-space:pre-wrap;max-height:60px;overflow:hidden">${esc(f.value)}</div></div><button class="admin-btn admin-btn-edit" onclick="moveMetaField(${i},-1)" title="上移">⬆</button><button class="admin-btn admin-btn-edit" onclick="moveMetaField(${i},1)" title="下移">⬇</button><button class="admin-btn admin-btn-edit" onclick="editMetaField(${i})">編輯</button><button class="admin-btn admin-btn-del" onclick="delMetaField(${i})">刪除</button></div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--text-light)">尚無自訂欄位，點上方「➕ 新增欄位」來新增</div>';
}
function moveMetaField(i,dir){const list=DATA.meta.customFields;const j=i+dir;if(j<0||j>=list.length)return;[list[i],list[j]]=[list[j],list[i]];saveLocal();renderMetaList()}
function editMetaField(idx){
  const f=idx!==null?DATA.meta.customFields[idx]:{label:'',value:''};
  document.getElementById('adminTabContent').innerHTML=`
    <button class="btn-secondary" onclick="showAdminTab('meta',document.querySelector('.admin-tab.active'))">← 返回</button>
    <h3 style="margin:16px 0">${idx!==null?'✏️ 編輯欄位':'➕ 新增欄位'}</h3>
    <div class="form-group"><label>欄位名稱</label><input type="text" id="mf_label" value="${esc(f.label)}" placeholder="例：業主窗口、LINE群組、注意事項..."></div>
    <div class="form-group"><label>內容</label><textarea id="mf_value" rows="5" placeholder="輸入內容...">${esc(f.value)}</textarea></div>
    <div style="margin-top:20px"><button class="btn-secondary" onclick="showAdminTab('meta',document.querySelector('.admin-tab.active'))">取消</button><button class="btn-primary" onclick="saveMetaField(${idx!==null?idx:'null'})">💾 儲存</button></div>`;
}
function saveMetaField(idx){
  const label=document.getElementById('mf_label').value.trim();
  const value=document.getElementById('mf_value').value.trim();
  if(!label){showToast('欄位名稱不可空白');return}
  if(!DATA.meta.customFields)DATA.meta.customFields=[];
  if(idx!==null){DATA.meta.customFields[idx]={label,value}}
  else{DATA.meta.customFields.push({label,value})}
  saveLocal();showToast('已儲存');showAdminTab('meta',document.querySelector('.admin-tab.active'));
}
function delMetaField(idx){const f=DATA.meta.customFields[idx];if(!f||!confirm(`刪除「${f.label}」？`))return;DATA.meta.customFields.splice(idx,1);saveLocal();showToast('已刪除');renderMetaList()}
function saveMetaSystem(){
  DATA.meta.title=document.getElementById('m_title').value.trim();
  DATA.meta.subtitle=document.getElementById('m_sub').value.trim();
  DATA.meta.email=document.getElementById('m_email').value.trim();
  DATA.meta.lineId=document.getElementById('m_line').value.trim();
  DATA.meta.version=document.getElementById('m_ver').value.trim();
  DATA.marquee=document.getElementById('m_marquee').value.trim();
  saveLocal();showToast('已儲存');renderAll();
}

// ---- 匯入/匯出 ----
function renderExportAdmin(){
  return`
    <div class="export-section"><h3>💾 匯出 data.json</h3><p>下載後上傳到 GitHub 覆蓋原檔，其他人就能看到最新內容</p><button class="btn-primary" onclick="exportData()">⬇️ 下載 data.json</button></div>
    <div class="export-section" style="background:#E3F2FD;border-color:#90CAF9"><h3 style="color:#1565C0">📤 匯入 data.json</h3><p>會覆蓋目前所有資料</p><button class="btn-primary" style="background:#1565C0" onclick="document.getElementById('impFile').click()">⬆️ 選擇檔案</button><input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)"></div>
    <div class="export-section" style="background:#FFF3E0;border-color:#FFB74D"><h3 style="color:#E65100">🔄 從伺服器重新載入</h3><p>捨棄本機暫存修改</p><button class="btn-primary" style="background:#E65100" onclick="reloadServer()">重新載入</button></div>
    <div class="export-section" style="background:#FFEBEE;border-color:#EF9A9A"><h3 style="color:#C62828">🗑️ 清除暫存</h3><p>清除瀏覽器暫存並登出</p><button class="btn-primary" style="background:#C62828" onclick="clearAll()">清除</button></div>
    <div style="margin-top:20px;padding:16px;background:var(--brand-bg);border-radius:8px;font-size:.9rem;color:var(--text-light)"><strong style="color:var(--brand)">📖 部署流程</strong><br>1. 前台直接點 ✏️ 編輯 QA / 後台管理分類<br>2. 到此分頁下載 data.json（每次下載版本號自動 +1）<br>3. 上傳 GitHub 覆蓋原檔<br>4. 其他人打開網頁會自動偵測到新版本，一鍵更新<br><br><strong style="color:var(--brand)">📊 統計</strong><br>QA：${DATA.qa.length} 則 ｜ 分類：${DATA.categories.length} 類<br>版本號：<strong>v${DATA.meta.buildNum||0}</strong> ｜ 更新日期：${DATA.meta.lastUpdate||'—'}</div>`;
}
function exportData(){DATA.meta.lastUpdate=new Date().toISOString().split('T')[0];DATA.meta.buildNum=(DATA.meta.buildNum||0)+1;saveLocal();const j=JSON.stringify(DATA,null,2);const b=new Blob([j],{type:'application/json;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='data.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast('已下載 data.json（v'+DATA.meta.buildNum+'）');showAdminTab('export',document.querySelector('.admin-tab.active'))}
function importData(inp){const f=inp.files[0];if(!f)return;if(!confirm('匯入會覆蓋所有資料，確定？')){inp.value='';return}const r=new FileReader();r.onload=e=>{try{const p=JSON.parse(e.target.result);if(!p.qa||!p.categories){showToast('格式不正確');return}DATA=p;saveLocal();showToast('匯入成功');renderAll();showAdminTab('export',document.querySelector('.admin-tab.active'))}catch(er){showToast('解析失敗')}};r.readAsText(f);inp.value=''}
async function reloadServer(){if(!confirm('捨棄暫存，確定？'))return;localStorage.removeItem('glico_qa_data');try{DATA=await loadJson();showToast('已重新載入');renderAll();showAdminTab('export',document.querySelector('.admin-tab.active'))}catch(e){showToast('失敗')}}
function clearAll(){if(!confirm('清除暫存並登出？'))return;localStorage.removeItem('glico_qa_data');isAdmin=false;document.body.classList.remove('admin-mode');closeAdmin();showToast('已清除');location.reload()}

function saveLocal(){DATA.meta.lastUpdate=new Date().toISOString().split('T')[0];try{localStorage.setItem('glico_qa_data',JSON.stringify(DATA))}catch(e){console.warn('儲存失敗',e)}}

document.getElementById('adminModal').addEventListener('click',e=>{if(e.target.id==='adminModal')closeAdmin()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAdmin()});
</script>
</body>
</html>
